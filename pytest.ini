[pytest]
pythonpath = .
testpaths = phase_1_data_loading/tests phase_2_user_input/tests phase_3_integrate/tests phase_4_recommendation/tests phase_5_display/tests phase_6_web/tests
addopts = -m "not integration and not groq"
markers =
    integration: downloads from Hugging Face (network required)
    groq: live Groq API (set GROQ_API_KEY; run pytest -m groq)
    e2e: full pipeline integration (no Groq when GROQ_API_KEY unset in test)
